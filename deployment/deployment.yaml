apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment
  labels:
    tier: frontend
    app: nginx
spec:
  selector:
    matchLabels:
      app: myapp
  replicas: 6
  template:
    metadata:
      name: testapp
      labels:
        app: myapp
    spec:
      containers:
        - name: nginx-image
          image: nginx:1.12
apiVersion: batch/v1
kind: Job
metadata:
  name: countdown-devops
spec:
  backoffLimit: 4
  completions: 1
  parallelism: 1
  template:
    metadata:
      name: countdown-devops
    spec:
      containers:
        - name: container-countdown-devops
          image: fedora:latest
          command: ["/bin/sh", "-c", "sleep 5"]
      restartPolicy: Never